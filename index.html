<body>

<header>VEG X – Cleaned & Chopped Vegetables</header>

<div class="container">

    <!-- PRODUCT CARDS BELOW -->
    

<style>
.product {
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 15px;
  margin: 15px 0;
  display: flex;
  align-items: center;
  gap: 15px;
}

.product img {
  width: 120px;
  height: 120px;
  border-radius: 10px;
  object-fit: cover;
}

.qty-box {
  width: 60px;
  padding: 5px;
  font-size: 16px;
}

.add-btn {
  background: green;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  font-size: 16px;
}

.cart-btn {
  background: #ff9800;
  color: white;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  width: 100%;
  margin-top: 20px;
  font-size: 18px;
}
</style>

<div id="product-list"></div>

<button class="cart-btn" onclick="checkout()">Checkout on WhatsApp</button>

<script src="data/products.js"></script>

<script>
let cart = [];

const container = document.getElementById("product-list");

products.forEach((p, index) => {
  const div = document.createElement("div");
  div.className = "product";

  div.innerHTML = `
    <img src="${p.image}" alt="${p.name}">
    <h3>${p.name}</h3>
    <p>${p.weight}</p>
    <p>₹${p.price}</p>
    <input type="number" id="qty-${index}" value="1" min="1">
    <button class="add-btn" onclick="addToCart(${index})">Add</button>
  `;

  container.appendChild(div);
});

function addToCart(index) {
  const qty = document.getElementById("qty-" + index).value;
  const p = products[index];

  cart.push(`${p.name} (${p.weight}) x ${qty} = ₹${p.price * qty}`);
  alert(p.name + " added");
}

function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  const message =
`New VEG X Order

${cart.join("\n")}

Address:
Mobile:`;

  window.open(
    "https://wa.me/917208487215?text=" + encodeURIComponent(message)
  );
}
</script>
