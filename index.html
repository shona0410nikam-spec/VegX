
  <script>
const products = [
  {name:"Onion", weight:"1kg", price:35, image:"images/Onion.png"},
  {name:"Potato", weight:"1kg", price:30, image:"images/Potato.png"},
  {name:"Tomato", weight:"1kg", price:35, image:"images/Tomato.png"},

  {name:"French Beans", weight:"300gm", price:50, image:"images/French Beans.png"},
  {name:"Cluster Beans", weight:"300gm", price:60, image:"images/Cluster Beans.png"},
  {name:"Drumsticks", weight:"300gm", price:40, image:"images/Drumsticks.png"},
  {name:"Green Peas", weight:"300gm", price:55, image:"images/Green Peas.png"},
  {name:"Carrot", weight:"300gm", price:40, image:"images/Carrot.png"},
  {name:"Cabbage", weight:"300gm", price:35, image:"images/Cabbage.png"},
  {name:"Bottle Gourd", weight:"300gm", price:40, image:"images/Bottle Gourd.png"},
  {name:"Bitter Gourd", weight:"300gm", price:60, image:"images/Bitter Gourd.png"},
  {name:"Lady Finger", weight:"300gm", price:60, image:"images/Lady Finger.png"},

  {name:"Pudina", weight:"100gm", price:15, image:"images/Pudina.png"},
  {name:"Coriander", weight:"200gm", price:20, image:"images/Coriander.png"},
  {name:"Palak", weight:"200gm", price:20, image:"images/Palak.png"},
  {name:"Methi", weight:"200gm", price:20, image:"images/Methi.png"},

  {name:"Lemon", weight:"3 pcs", price:15, image:"images/Lemon.png"},
  {name:"Capsicum", weight:"300gm", price:30, image:"images/Capsicum.png"},
  {name:"Red Pumpkin", weight:"300gm", price:30, image:"images/Red Pumpkin.png"},
  {name:"Ridge Gourd", weight:"300gm", price:60, image:"images/Ridge Gourd.png"},
  {name:"Sponge Gourd", weight:"300gm", price:40, image:"images/Sponge Gourd.png"},
  {name:"Cauliflower", weight:"300gm", price:60, image:"images/Cauliflower.png"},
  {name:"Pulav Mix", weight:"300gm", price:50, image:"images/Pulav Mix.png"}
];

let cart = [];
let total = 0;

function renderProducts() {
  let html = "";
  products.forEach((p, i) => {
    html += `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.weight} | ₹${p.price}</p>
        <input type="number" id="qty${i}" value="1" min="1">
        <button onclick="addToCart(${i})">Add</button>
      </div>
    `;
  });
  document.getElementById("product-list").innerHTML = html;
}

function addToCart(i) {
  const qty = document.getElementById("qty"+i).value;
  const item = products[i];
  const price = item.price * qty;
  cart.push(`${item.name} (${item.weight}) x ${qty} = ₹${price}`);
  total += price;
  document.getElementById("cart-total").innerText = total;
}

function checkout() {
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }
  const msg =
`Veg X Order
----------------
${cart.join("\n")}
----------------
Total: ₹${total}

Address:
Mobile:`;
  window.open("https://wa.me/917208487215?text=" + encodeURIComponent(msg));
}

renderProducts();
      </script>
