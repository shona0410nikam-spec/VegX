
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VEG X – Cleaned & Chopped Vegetables</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#2e7d32;color:#fff;padding:15px;font-size:20px}
.container{padding:15px}
.card{background:#fff;border-radius:10px;padding:10px;margin-bottom:12px;display:flex;gap:10px}
.card img{width:90px;height:90px;border-radius:8px;object-fit:cover}
.btn{background:#2e7d32;color:#fff;border:none;padding:8px 12px;border-radius:6px}
input{padding:8px;width:100%;margin-bottom:8px}
.total{background:#fff;padding:15px;border-radius:10px;margin-top:15px}
.checkout{background:#ff9800;color:#fff;border:none;padding:14px;width:100%;font-size:16px;border-radius:8px}
</style>
</head>

<body>

<header>🥬 VEG X – Cleaned & Chopped Vegetables</header>

<div class="container" id="productList"></div>

<div class="container">
  <div class="total">
    <p>Subtotal: ₹<span id="subtotal">0</span></p>
    <p>Delivery: ₹<span id="delivery">50</span></p>
    <h3>Total: ₹<span id="total">0</span></h3>

    <input placeholder="Your Name">
    <input placeholder="Mobile Number">
    <textarea placeholder="Delivery Address"></textarea>

    <button class="checkout">Checkout on WhatsApp</button>
  </div>
</div>

<script>
/* ===== PRODUCTS ===== */
let products = JSON.parse(localStorage.getItem("vegx_products"));

if(!products){
  products = [
    {
      name:"Cleaned & Chopped Cabbage",
      weight:"300gm",
      price:40,
      image:"images/cabbage.png",
      active:true
    }
  ];
  localStorage.setItem("vegx_products",JSON.stringify(products));
}

/* ===== RENDER ===== */
const list = document.getElementById("productList");
let subtotal = 0;

products.forEach((p,i)=>{
  if(!p.active) return;

  const div = document.createElement("div");
  div.className="card";
  div.innerHTML=`
    <img src="${p.image}">
    <div>
      <b>${p.name}</b><br>
      ${p.weight} – ₹${p.price}<br>
      Qty: <input type="number" value="0" min="0" onchange="update(${i},this.value)">
    </div>
  `;
  list.appendChild(div);
});

function update(i,qty){
  subtotal = 0;
  document.querySelectorAll("input[type=number]").forEach((q,idx)=>{
    subtotal += q.value * products[idx].price;
  });
  document.getElementById("subtotal").innerText=subtotal;
  document.getElementById("total").innerText=subtotal+50;
}
</script>

</body>
  </html>
