<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>VEG X – Fresh & Clean Vegetables</title>
<meta name="viewport" content="width=device-width, initial-scale=1"><style>
body{font-family:Arial, sans-serif;background:#f4f4f4;margin:0}
header{background:#2e7d32;color:#fff;padding:15px;font-size:20px;font-weight:bold;text-align:center}
.section{margin:10px}
.section h3{margin:10px 5px;color:#2e7d32}
.product{background:#fff;margin:8px 0;padding:10px;border-radius:10px;display:flex;gap:10px;align-items:center}
.product img{width:80px;height:80px;object-fit:cover;border-radius:8px;background:#eee}
.details{flex:1}
.add-btn{background:#2e7d32;color:#fff;border:none;padding:8px 12px;border-radius:6px}
.qty{width:50px}
.cart{background:#fff;padding:10px;margin:10px;border-radius:10px}
.checkout{background:#ff9800;color:#fff;border:none;width:100%;padding:15px;font-size:18px;border-radius:10px}
.admin-btn{position:fixed;bottom:20px;right:20px;background:#000;color:#fff;padding:10px 15px;border-radius:20px;text-decoration:none}
</style></head>
<body><header>🥬 VEG X – Fresh, Clean & Chopped Vegetables</header><div id="productList"></div><div class="cart">
<b>🛒 Cart</b><br>
Total: ₹<span id="total">0</span><br><br>
<select id="area">
<option value="">Select Area</option>
<option>Kalyan</option>
<option>Dombivli</option>
<option>Bhiwandi</option>
</select><br><br>
<button class="checkout" onclick="checkout()">Checkout on WhatsApp</button>
</div><a href="admin.html" class="admin-btn">ADMIN</a>

<script>
let minOrder=299;
let deliveryCharge=50;
let cartTotal=0;
let cart=[];

const products=[
{cat:"Daily Vegetables",name:"Onion",wt:"1kg",price:35,img:"images/products/Onion.jpg"},
{cat:"Daily Vegetables",name:"Potato",wt:"1kg",price:30,img:"images/products/Potato.jpg"},
{cat:"Daily Vegetables",name:"Tomato",wt:"1kg",price:35,img:"images/products/Tomato.jpg"},

{cat:"Chopped Vegetables",name:"French Beans",wt:"300gm",price:50,img:"images/products/Cleaned & Chopped French Beans.jpg"},
{cat:"Chopped Vegetables",name:"Cluster Beans",wt:"300gm",price:60,img:"images/products/Cleaned & Chopped Cluster Beans.jpg"},
{cat:"Chopped Vegetables",name:"Drumsticks",wt:"300gm",price:40,img:"images/products/Cleaned & Chopped Drumstick.png"},

{cat:"New Products",name:"Fresh Coconut Grated",wt:"200gm",price:40,img:"images/products/Fresh coconut Grated.jpg"},
{cat:"New Products",name:"Green Chilli",wt:"100gm",price:15,img:"images/products/Green Chilli.png"},
{cat:"New Products",name:"Garlic Peeled",wt:"100gm",price:35,img:"images/products/Garlic Peeled.jpg"}
];

function render(){
let html="";
let cats=[...new Set(products.map(p=>p.cat))];
cats.forEach(c=>{
html+=`<div class='section'><h3>${c}</h3>`;
products.filter(p=>p.cat===c).forEach((p,i)=>{
html+=`<div class='product'>
<img src='${p.img}' onerror="this.src='https://via.placeholder.com/80'">
<div class='details'><b>${p.name}</b><br>${p.wt} – ₹${p.price}<br>
Qty <input type='number' id='q${i}' class='qty' value='1' min='1'></div>
<button class='add-btn' onclick='add(${i})'>Add</button>
</div>`;
});
html+='</div>';
});
document.getElementById('productList').innerHTML=html;
}

function add(i){
let q=document.getElementById('q'+i).value;
let p=products[i];
let cost=p.price*q;
cartTotal+=cost;
cart.push(`${p.name} x${q} = ₹${cost}`);
document.getElementById('total').innerText=cartTotal;
}

function checkout(){
if(cartTotal<minOrder){alert('Minimum order ₹'+minOrder);return;}
let area=document.getElementById('area').value;
if(!area){alert('Select delivery area');return;}
let final=cartTotal+deliveryCharge;
let msg=`VEG X Order\n\n${cart.join("\n")}\n\nSubtotal: ₹${cartTotal}\nDelivery: ₹${deliveryCharge}\nTotal: ₹${final}\nArea: ${area}`;
window.open('https://wa.me/7208487215?text='+encodeURIComponent(msg));
}

render();
</script></body>
</html>
