<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<title>VEG X – Fresh Vegetables</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:0}
header{background:#2e7d32;color:#fff;padding:12px;text-align:center}
section{padding:15px}
.card{background:#fff;padding:12px;margin-bottom:12px;border-radius:8px}
.product{display:flex;gap:10px;align-items:center}
.product img{width:80px;height:80px;object-fit:cover;border-radius:6px}
button{background:#2e7d32;color:#fff;border:none;padding:8px 12px;border-radius:6px}
input,select{padding:7px;width:100%;margin:5px 0}
.hidden{display:none}
.cart-item{display:flex;justify-content:space-between;margin:6px 0}
.admin-btn{position:fixed;bottom:15px;right:15px;background:#000}
.logout{background:#c62828}
</style>
</head>

<body>

<header>
<h2>🥬 VEG X – Fresh & Clean Vegetables</h2>
<div id="offerText"></div>
</header>

<!-- PRODUCTS -->
<section id="shop"></section>

<!-- CART -->
<section class="card">
<h3>🛒 Cart</h3>
<div id="cart"></div>
<p><b>Total: ₹<span id="total">0</span></b></p>

<select id="area">
<option value="">Select Delivery Area</option>
</select>

<button onclick="checkout()">Checkout</button>
<p id="msg" style="color:red"></p>
</section>

<!-- ADMIN PANEL -->
<section id="admin" class="hidden">
<div class="card">
<h3>🔐 Admin Login</h3>
<input type="password" id="adminPass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="hidden">

<div class="card">
<h3>🏷️ Offer Banner</h3>
<input id="offerInput" placeholder="Free delivery above ₹499">
<button onclick="saveOffer()">Save</button>
</div>

<div class="card">
<h3>📍 Delivery Areas</h3>
<input id="areaInput" placeholder="Add area">
<button onclick="addArea()">Add</button>
<ul id="areaList"></ul>
</div>

<div class="card">
<h3>⚙️ Order Settings</h3>
<input id="minOrder" type="number" placeholder="Minimum Order">
<input id="deliveryCharge" type="number" placeholder="Delivery Charge">
<button onclick="saveSettings()">Save</button>
</div>

<div class="card">
<h3>🎟️ Coupon</h3>
<input id="couponCode" placeholder="Code (VEGX99)">
<input id="couponValue" type="number" placeholder="Discount">
<button onclick="saveCoupon()">Save</button>
</div>

<button class="logout" onclick="logout()">Logout</button>
</div>
</section>

<button class="admin-btn" onclick="openAdmin()">ADMIN</button>

<script>
/* ---------- DATA ---------- */
const products=[
{name:"Onion",price:40,weight:"1kg",img:"images/products/onion.jpg"},
{name:"Potato",price:30,weight:"1kg",img:"images/products/potato.jpg"},
{name:"Tomato",price:35,weight:"1kg",img:"images/products/tomato.jpg"},
{name:"Fresh Coconut Grated",price:40,weight:"200gm",img:"images/products/Fresh coconut Grated.jpg"},
{name:"Green Chilli",price:15,weight:"100gm",img:"images/products/Green Chilli.png"},
{name:"Garlic Peeled",price:35,weight:"100gm",img:"images/products/Garlic Peeled.jpg"}
];

let cart=[];
let settings=JSON.parse(localStorage.getItem("settings")) || {min:299,delivery:50};
let coupon=JSON.parse(localStorage.getItem("coupon")) || {code:"VEGX99",value:99};

/* ---------- SHOP ---------- */
function loadShop(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card product">
<img src="${p.img}">
<div>
<b>${p.name}</b><br>${p.weight}<br>₹${p.price}<br>
<button onclick="add(${i})">Add</button>
</div>
</div>`;
});
document.getElementById("shop").innerHTML=html;
}

/* ---------- CART ---------- */
function add(i){
cart.push(products[i]);
renderCart();
}
function renderCart(){
let t=0,html="";
cart.forEach(p=>{t+=p.price;html+=`<div class="cart-item">${p.name} ₹${p.price}</div>`});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=t;
}
function checkout(){
let total=cart.reduce((s,p)=>s+p.price,0);
if(total<settings.min){msg(`Minimum order ₹${settings.min}`);return;}
if(!area.value){msg("Select delivery area");return;}
msg("Order placed ✅");
}

/* ---------- ADMIN ---------- */
function openAdmin(){admin.classList.toggle("hidden")}
function login(){
if(adminPass.value==="1234"){
adminPanel.classList.remove("hidden");
}else alert("Wrong password");
}
function logout(){adminPanel.classList.add("hidden")}

function saveOffer(){
localStorage.setItem("offer",offerInput.value);
loadOffer();
}
function loadOffer(){
offerText.innerText=localStorage.getItem("offer")||"";
}
function addArea(){
let a=areaInput.value;
let list=JSON.parse(localStorage.getItem("areas"))||[];
list.push(a);
localStorage.setItem("areas",JSON.stringify(list));
loadAreas();
}
function loadAreas(){
let list=JSON.parse(localStorage.getItem("areas"))||[];
area.innerHTML='<option value="">Select Area</option>';
areaList.innerHTML="";
list.forEach(a=>{
area.innerHTML+=`<option>${a}</option>`;
areaList.innerHTML+=`<li>${a}</li>`;
});
}
function saveSettings(){
settings={min:+minOrder.value,delivery:+deliveryCharge.value};
localStorage.setItem("settings",JSON.stringify(settings));
alert("Saved");
}
function saveCoupon(){
coupon={code:couponCode.value,value:+couponValue.value};
localStorage.setItem("coupon",JSON.stringify(coupon));
alert("Coupon saved");
}
function msg(t){document.getElementById("msg").innerText=t}

/* INIT */
loadShop();
loadOffer();
loadAreas();
</script>

</body>
</html>
