
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VEG X – Cleaned & Chopped Vegetables</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  margin:0;
}
header{
  background:#2e7d32;
  color:#fff;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}
.product{
  background:#fff;
  margin:10px;
  padding:10px;
  border-radius:10px;
  display:flex;
  align-items:center;
  gap:10px;
}
.product img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}
.product-details{
  flex:1;
}
.qty{
  width:50px;
}
.add-btn{
  background:#2e7d32;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}
.checkout{
  background:#ff9800;
  color:#fff;
  border:none;
  width:95%;
  margin:15px;
  padding:15px;
  font-size:18px;
  border-radius:10px;
  cursor:pointer;
}
.total{
  font-size:16px;
  margin:10px;
}
.note{
  margin:10px;
  color:#d32f2f;
  font-weight:bold;
}
</style>
</head>

<body>

<header>VEG X – Cleaned & Chopped Vegetables</header>

<div class="note">Minimum Order Value ₹299 | Delivery Charges ₹50</div>

<div id="product-list"></div>

<div class="total">
  Subtotal: ₹ <span id="cartTotal">0</span><br>
  Delivery: ₹ <span id="delivery">0</span><br>
  <b>Grand Total: ₹ <span id="grandTotal">0</span></b>
</div>

<button class="checkout" onclick="checkout()">Checkout on WhatsApp</button>

<script>
const products = [
  {name:"Onion", weight:"1kg", price:35, image:"Onion.png"},
  {name:"Potato", weight:"1kg", price:30, image:"Potato.png"},
  {name:"Tomato", weight:"1kg", price:35, image:"Tomato.png"},

  {name:"French Beans", weight:"300gm", price:50, image:"Cleaned & Chopped French Beans.jpg"},
  {name:"Cluster Beans", weight:"300gm", price:60, image:"Cleaned & Chopped Cluster Beans.jpg"},
  {name:"Drumsticks", weight:"300gm", price:40, image:"Cleaned & Chopped Drumstick.png"},
  {name:"Green Peas", weight:"300gm", price:55, image:"Cleaned & Shelled Green Peas .jpg"},
  {name:"Carrot", weight:"300gm", price:40, image:"Cleaned & Chopped Carrot .png"},
  {name:"Cabbage", weight:"300gm", price:35, image:"Cleaned & Chopped Cabbage .jpg"},
  {name:"Bottle Gourd", weight:"300gm", price:40, image:"Cleaned & Chopped Bottle Gourd.png"},
  {name:"Bitter Gourd", weight:"300gm", price:60, image:"Cleaned & Chopped Bitter Gourd.png"},
  {name:"Lady Finger", weight:"300gm", price:60, image:"Cleaned & Chopped Lady Finger .jpg"},

  {name:"Pudina", weight:"100gm", price:15, image:"Cleaned Pudina.jpg"},
  {name:"Coriander", weight:"200gm", price:20, image:"Cleaned coriander.png"},
  {name:"Palak", weight:"200gm", price:20, image:"Cleaned Palak.png"},
  {name:"Methi", weight:"200gm", price:20, image:"Cleaned methi.png"},

  {name:"Lemon", weight:"3 pcs", price:15, image:"Lemon.jpg"},
  {name:"Capsicum", weight:"300gm", price:30, image:"Cleaned & Chopped Capsicum Green.jpg"},
  {name:"Red Pumpkin", weight:"300gm", price:30, image:"Cleaned and cut Red Pumpkin.png"},
  {name:"Ridge Gourd", weight:"300gm", price:60, image:"Cleaned & Chopped Ridge Gourd.jpg"},
  {name:"Sponge Gourd", weight:"300gm", price:40, image:"Cleaned & Cut Sponge Gourd.jpg"},
  {name:"Cauliflower", weight:"300gm", price:60, image:"Cleaned & Chopped Cauliflower.jpg"},
  {name:"Pulav Mix", weight:"300gm", price:50, image:"Mixed Pulav Vegetables.png"},

  /* NEW PRODUCTS */
  {name:"Fresh Coconut (Grated)", weight:"200gm", price:40, image:"Fresh coconut Grated.jpg"},
  {name:"Green Chilli", weight:"100gm", price:15, image:"Green Chilli.png"},
  {name:"Garlic (Peeled)", weight:"100gm", price:35, image:"Garlic Peeled.jpg"}
];

let cart = [];
let subtotal = 0;

function renderProducts(){
  let html = "";
  products.forEach((p,i)=>{
    html += `
      <div class="product">
        <img src="images/products/${p.image}">
        <div class="product-details">
          <b>${p.name}</b><br>
          ${p.weight} – ₹${p.price}<br>
          Qty:
          <input type="number" id="qty${i}" class="qty" value="1" min="1">
        </div>
        <button class="add-btn" onclick="addToCart(${i})">Add</button>
      </div>
    `;
  });
  document.getElementById("product-list").innerHTML = html;
}

function addToCart(i){
  let qty = Number(document.getElementById("qty"+i).value);
  let item = products[i];
  let cost = item.price * qty;
  subtotal += cost;
  cart.push(`${item.name} ${item.weight} x${qty} = ₹${cost}`);
  updateTotal();
}

function updateTotal(){
  document.getElementById("cartTotal").innerText = subtotal;
  let delivery = subtotal >= 299 ? 50 : 0;
  document.getElementById("delivery").innerText = delivery;
  document.getElementById("grandTotal").innerText = subtotal + delivery;
}

function checkout(){
  if(subtotal < 299){
    alert("Minimum shopping amount is ₹299");
    return;
  }

  let msg =
`🛒 VEG X Order

${cart.join("\n")}

Subtotal: ₹${subtotal}
Delivery: ₹50
Grand Total: ₹${subtotal + 50}

Address:
Mobile:`;

  window.open("https://wa.me/7208487215?text="+encodeURIComponent(msg));
}

renderProducts();
</script>

</body>
</html>
