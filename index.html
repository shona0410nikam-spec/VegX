<body>

<header>VEG X – Cleaned & Chopped Vegetables</header>

<div class="container">

    <!-- PRODUCT CARDS BELOW -->
    

<style>
.product {
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 15px;
  margin: 15px 0;
  display: flex;
  align-items: center;
  gap: 15px;
}

.product img {
  width: 120px;
  height: 120px;
  border-radius: 10px;
  object-fit: cover;
}

.qty-box {
  width: 60px;
  padding: 5px;
  font-size: 16px;
}

.add-btn {
  background: green;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  font-size: 16px;
}

.cart-btn {
  background: #ff9800;
  color: white;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  width: 100%;
  margin-top: 20px;
  font-size: 18px;
}
</style>

<div id="product-list"></div>

<button class="cart-btn" onclick="checkout()">Checkout on WhatsApp</button>

<script>
const products = [
  { name: "French Beans", price: 50, image: "Cleaned & Chopped French Beans.jpg" },
  { name: "Cluster Beans", price: 60, image: "Cleaned & Chopped Cluster Beans.jpg" },
  { name: "Drumsticks", price: 40, image: "Cleaned & Chopped Drumstick.png" },
  { name: "Green Peas", price: 55, image: "Cleaned & Shelled Green Peas .jpg" },
  { name: "Mix P Veg", price: 60, image: "Mixed Pulav Vegetables.png" },
  { name: "Bottle Gourd", price: 45, image: "Cleaned & Chopped Bottle Gourd.png" },
  { name: "Ridge Gourd", price: 45, image: "Cleaned & Chopped Ridg Gourd.jpg" },
  { name: "Sponge Gourd", price: 40, image: "Cleaned & Cut Sponge Gourd.jpg" },
  { name: "Bitter Gourd", price: 50, image: "Cleaned & Chopped Bitter Gourd.png" },
  { name: "Pumpkin", price: 35, image: "Cleaned and cut Red Pumpkin.png" },
  { name: "Bhendi", price: 50, image: "Cleaned & Chopped Lady Finger .jpg" },
  { name: "Cabbage", price: 30, image: "Cleaned & Chopped Cabbage.jpg" },
  { name: "Cauliflower", price: 40, image: "Cleaned & Chopped Cauliflower.jpg" },
  { name: "Capsicum", price: 60, image: "Cleaned & Chopped Capsicum Green.jpg" },
  { name: "Carrot", price: 50, image: "Cleaned & Chopped Carrot .png" },
  { name: "Potato", price: 20, image: "Potato.png" },
  { name: "Onion", price: 20, image: "Onion.png" },
  { name: "Tomato", price: 20, image: "Tomato.png" },
  { name: "Lemon", price: 15, image: "Lemon.jpg" },
  { name: "Methi", price: 20, image: "Cleaned methi.png" },
  { name: "Pudina", price: 15, image: "Cleaned Pudina.jpg" },
  { name: "Palak", price: 25, image: "Cleaned Palak.png" },
  { name: "Coriander", price: 10, image: "Cleaned coriander.png" }
];

let cart = [];

function renderProducts() {
  let html = "";
  products.forEach((p, i) => {
    html += `
      <div class="product">
        <img src="images/${p.image}" alt="${p.name}">
        <div>
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <input type="number" id="qty${i}" class="qty-box" value="1" min="1">
          <button class="add-btn" onclick="addToCart(${i})">Add</button>
        </div>
      </div>
    `;
  });
  document.getElementById("product-list").innerHTML = html;
}

function addToCart(index) {
  const qty = document.getElementById("qty" + index).value;
  const item = products[index];

  cart.push(`${item.name} – ${qty} qty – ₹${item.price * qty}`);

  alert(item.name + " added!");
}

function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  const message = `
🛒 *New VegX Order*  
-----------------------  
${cart.join("\n")}
-----------------------  
📍 Address:  
📞 Mobile:
  `;

  window.open(
    `https://wa.me/7208487215?text=${encodeURIComponent(message)}`
  );
}

renderProducts();
      </script>
