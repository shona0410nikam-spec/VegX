
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VEG X – Fresh Vegetables</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#2e7d32;color:#fff;padding:15px;font-size:20px;font-weight:bold;text-align:center}
.offer{background:#ff9800;color:#fff;text-align:center;padding:10px;font-weight:bold}
.product{background:#fff;margin:10px;padding:10px;border-radius:10px;display:flex;gap:10px;align-items:center}
.product img{width:90px;height:90px;border-radius:8px;object-fit:cover}
.product input{width:50px}
.product button{background:#2e7d32;color:#fff;border:none;padding:8px 12px;border-radius:6px}
.summary{background:#fff;margin:10px;padding:10px;border-radius:10px;font-size:16px}
.checkout{background:#2e7d32;color:#fff;border:none;width:95%;margin:10px;padding:15px;font-size:18px;border-radius:10px}
.form{background:#fff;margin:10px;padding:10px;border-radius:10px}
.form input,.form textarea,.form select{width:100%;margin-bottom:8px;padding:8px}
</style>
</head>

<body>

<header>🥬 VEG X – Fresh Vegetables</header>

<div class="offer">🔥 Minimum Order ₹299 | Delivery Charge ₹50</div>

<div id="product-list"></div>

<div class="summary">
  Cart Total: ₹ <span id="total">0</span><br>
  Delivery: ₹50<br>
  <b>Payable: ₹ <span id="payable">0</span></b>
</div>

<div class="form">
  <input id="name" placeholder="Customer Name">
  <input id="mobile" placeholder="Mobile Number">
  <textarea id="address" placeholder="Address"></textarea>

  <select id="area">
    <option>Kalyan</option>
    <option>Dombivli</option>
    <option>Bhiwandi</option>
  </select>
</div>

<button class="checkout" onclick="checkout()">Checkout on WhatsApp</button>

<script>
const MIN_ORDER = 299;
const DELIVERY = 50;
const WHATSAPP = "7208487215";

const products = [
  {n:"Onion",w:"1kg",p:35,i:"Onion.png"},
  {n:"Potato",w:"1kg",p:30,i:"Potato.png"},
  {n:"Tomato",w:"1kg",p:35,i:"Tomato.png"},

  {n:"French Beans",w:"300gm",p:50,i:"Cleaned & Chopped French Beans.jpg"},
  {n:"Cluster Beans",w:"300gm",p:60,i:"Cleaned & Chopped Cluster Beans.jpg"},
  {n:"Drumstick",w:"300gm",p:40,i:"Cleaned & Chopped Drumstick.png"},
  {n:"Green Peas",w:"300gm",p:55,i:"Cleaned & Shelled Green Peas .jpg"},
  {n:"Lady Finger",w:"300gm",p:60,i:"Cleaned & Chopped Lady Finger .jpg"},

  {n:"Pudina",w:"100gm",p:15,i:"Cleaned Pudina.jpg"},
  {n:"Coriander",w:"200gm",p:20,i:"Cleaned coriander.png"},
  {n:"Palak",w:"200gm",p:20,i:"Cleaned Palak.png"},
  {n:"Methi",w:"200gm",p:20,i:"Cleaned methi.png"},

  {n:"Lemon",w:"3 pcs",p:15,i:"Lemon.jpg"},
  {n:"Capsicum",w:"300gm",p:30,i:"Cleaned & Chopped Capsicum Green.jpg"},
  {n:"Pumpkin",w:"300gm",p:30,i:"Cleaned and cut Red Pumpkin.png"},
  {n:"Ridge Gourd",w:"300gm",p:60,i:"Cleaned & Chopped Ridge Gourd.jpg"},
  {n:"Sponge Gourd",w:"300gm",p:40,i:"Cleaned & Cut Sponge Gourd.jpg"},
  {n:"Cauliflower",w:"300gm",p:60,i:"Cleaned & Chopped Cauliflower.jpg"},
  {n:"Pulav Mix",w:"300gm",p:50,i:"Mixed Pulav Vegetables.png"},

  {n:"Fresh Coconut",w:"200gm",p:40,i:"Fresh coconut Grated.jpg"},
  {n:"Green Chilli",w:"100gm",p:15,i:"Green Chilli.png"},
  {n:"Garlic Peeled",w:"100gm",p:35,i:"Garlic Peeled.jpg"}
];

let cart=[], total=0;

function render(){
  let html="";
  products.forEach((x,i)=>{
    html+=`
    <div class="product">
      <img src="images/products/${x.i}">
      <div>
        <b>${x.n}</b><br>
        ${x.w} – ₹${x.p}<br>
        Qty <input type="number" id="q${i}" value="1" min="1">
      </div>
      <button onclick="add(${i})">Add</button>
    </div>`;
  });
  document.getElementById("product-list").innerHTML=html;
}
render();

function add(i){
  let q=+document.getElementById("q"+i).value;
  total += products[i].p * q;
  cart.push(`${products[i].n} x${q}`);
  document.getElementById("total").innerText=total;
  document.getElementById("payable").innerText=total + DELIVERY;
}

function checkout(){
  if(total < MIN_ORDER){
    alert("Minimum order ₹299 required");
    return;
  }
  let msg = `VEG X ORDER
${cart.join("\n")}
Total: ₹${total + DELIVERY}

Name: ${name.value}
Mobile: ${mobile.value}
Area: ${area.value}
Address: ${address.value}`;

  window.open("https://wa.me/"+WHATSAPP+"?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
