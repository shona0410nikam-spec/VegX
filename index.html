
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEG X – Cleaned & Chopped Vegetables</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#2e7d32;color:#fff;padding:12px;text-align:center;font-weight:bold}
.banner{background:#ffe082;padding:10px;text-align:center;font-size:14px}
.product{background:#fff;margin:8px;border-radius:6px;display:flex;padding:8px;align-items:center}
.product img{width:70px;height:70px;border-radius:6px;object-fit:cover;margin-right:10px}
.qty{width:50px}
.total-box{background:#fff;padding:10px;margin:10px;border-radius:6px}
input,textarea{width:100%;padding:8px;margin-top:6px}
button{width:100%;padding:12px;background:#f57c00;color:#fff;border:none;border-radius:6px;font-size:16px}
</style>
</head>

<body>

<header>🥬 VEG X – Cleaned & Chopped Vegetables</header>

<div class="banner">
🚚 Free Delivery on orders ₹399 & above<br>
🔥 Fresh | Hygienic | Same Day Delivery<br>
📲 Order on WhatsApp – Easy & Fast
</div>

<div id="products"></div>

<div class="total-box">
<p>Subtotal: ₹<span id="subtotal">0</span></p>
<p>Delivery: ₹<span id="delivery">50</span></p>
<h3>Total: ₹<span id="total">0</span></h3>

<input id="name" placeholder="Your Name">
<input id="mobile" placeholder="Mobile Number">
<textarea id="address" placeholder="Delivery Address"></textarea>

<button onclick="checkout()">Checkout on WhatsApp</button>
</div>

<script>
const deliveryCharge = 50;
const freeDeliveryAbove = 399;

const products = [
{name:"Drumstick",weight:"300gm",price:60,img:"Cleaned & Chopped Drumstick.png"},
{name:"Potato",weight:"1kg",price:60,img:"Potato.png"},
{name:"Onion",weight:"1kg",price:40,img:"Onion.png"},
{name:"Tomato",weight:"500gm",price:30,img:"Tomato.png"},
{name:"Lemon",weight:"3 pcs",price:20,img:"Lemon.jpg"},
{name:"Methi",weight:"300gm",price:60,img:"Cleaned methi.png"},
{name:"French Beans",weight:"300gm",price:60,img:"Cleaned & Chopped French Beans.jpg"},
{name:"Mixed Pulav Veg",weight:"300gm",price:60,img:"Mixed Pulav Vegetables.png"},
{name:"Pudina",weight:"300gm",price:20,img:"Cleaned Pudina.jpg"},
{name:"Palak",weight:"200gm",price:60,img:"Cleaned Palak.png"},
{name:"Coriander",weight:"100gm",price:20,img:"Cleaned coriander.png"},
{name:"Capsicum Green",weight:"300gm",price:60,img:"Cleaned & Chopped Capsicum Green.jpg"},
{name:"Red Pumpkin",weight:"300gm",price:60,img:"Cleaned and cut Red Pumpkin.png"},
{name:"Sponge Gourd",weight:"300gm",price:60,img:"Cleaned & Cut Sponge Gourd.jpg"},
{name:"Ridge Gourd",weight:"300gm",price:60,img:"Cleaned & Chopped Ridg Gourd.jpg"},
{name:"Green Peas",weight:"300gm",price:60,img:"Cleaned & Shelled Green Peas .jpg"},
{name:"Carrot",weight:"300gm",price:50,img:"Cleaned & Chopped Carrot .png"},
{name:"Bottle Gourd",weight:"300gm",price:60,img:"Cleaned & Chopped Bottle Gourd.png"},
{name:"Bitter Gourd",weight:"300gm",price:60,img:"Cleaned & Chopped Bitter Gourd.png"},
{name:"Cauliflower",weight:"300gm",price:60,img:"Cleaned & Chopped Cauliflower.jpg"},
{name:"Lady Finger",weight:"300gm",price:50,img:"Cleaned & Chopped Lady Finger .jpg"},
{name:"Cluster Beans",weight:"300gm",price:60,img:"Cleaned & Chopped Cluster Beans.jpg"},
{name:"Fresh Coconut Grated",weight:"200gm",price:60,img:"Fresh coconut Grated.jpg"},
{name:"Green Chilli",weight:"100gm",price:20,img:"Green Chilli.png"}
];

const list = document.getElementById("products");

products.forEach((p,i)=>{
list.innerHTML += `
<div class="product">
<img src="VegX/images/products/${p.img}">
<div style="flex:1">
<b>${p.name}</b><br>
${p.weight} – ₹${p.price}
</div>
<input class="qty" type="number" min="0" value="0" onchange="calc()">
</div>`;
});

function calc(){
let subtotal=0;
document.querySelectorAll(".product").forEach((row,i)=>{
let qty=row.querySelector(".qty").value;
subtotal += qty * products[i].price;
});
document.getElementById("subtotal").innerText=subtotal;
let delivery = subtotal>=freeDeliveryAbove || subtotal==0 ? 0 : deliveryCharge;
document.getElementById("delivery").innerText=delivery;
document.getElementById("total").innerText=subtotal+delivery;
}

function checkout(){
let msg="🛒 *VEG X Order*%0A%0A";
let subtotal=0;

document.querySelectorAll(".product").forEach((row,i)=>{
let qty=row.querySelector(".qty").value;
if(qty>0){
msg+=`${products[i].name} (${products[i].weight}) x ${qty} = ₹${qty*products[i].price}%0A`;
subtotal+=qty*products[i].price;
}
});

let delivery=subtotal>=freeDeliveryAbove?0:deliveryCharge;
let total=subtotal+delivery;

msg+=`%0ASubtotal: ₹${subtotal}`;
msg+=`%0ADelivery: ₹${delivery}`;
msg+=`%0A*Total: ₹${total}*%0A%0A`;

msg+=`Name: ${name.value}%0A`;
msg+=`Mobile: ${mobile.value}%0A`;
msg+=`Address: ${address.value}`;

window.open(`https://wa.me/91YOURNUMBER?text=${msg}`);
}
</script>

</body>
</html>
