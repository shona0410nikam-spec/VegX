<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VEG X – Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:15px;
}
h2,h3{
  color:#2e7d32;
}
.box{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
input,button{
  width:100%;
  padding:8px;
  margin:6px 0;
}
button{
  background:#2e7d32;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.logout{
  background:#c62828;
}
.product-row{
  border-bottom:1px solid #eee;
  padding:8px 0;
}
.small-btn{
  padding:5px;
  font-size:12px;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>🔐 VEG X Admin Panel</h2>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <input type="password" id="password" placeholder="Enter Admin Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none">

  <div class="box">
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- OFFER -->
  <div class="box">
    <h3>🏷 Offer / Banner</h3>
    <input id="offerText" placeholder="Eg: Free delivery above ₹499">
    <button onclick="saveOffer()">Save Banner</button>
    <p><b>Current:</b> <span id="currentOffer"></span></p>
  </div>

  <!-- SETTINGS -->
  <div class="box">
    <h3>⚙ Order Settings</h3>
    <input id="minOrder" type="number" placeholder="Minimum Order ₹">
    <input id="deliveryCharge" type="number" placeholder="Delivery Charge ₹">
    <button onclick="saveSettings()">Save Settings</button>
  </div>

  <!-- ADD PRODUCT -->
  <div class="box">
    <h3>➕ Add New Product</h3>
    <input id="pname" placeholder="Product Name">
    <input id="pweight" placeholder="Weight (eg 200gm)">
    <input id="pprice" type="number" placeholder="Price ₹">
    <input id="pimage" placeholder="Image file name (images/xxx.jpg)">
    <button onclick="addProduct()">Add Product</button>
  </div>

  <!-- PRODUCT LIST -->
  <div class="box">
    <h3>📦 Manage Products</h3>
    <div id="productList"></div>
  </div>

</div>

<script>
const ADMIN_PASSWORD = "vegx123";

/* LOGIN */
function login(){
  if(document.getElementById("password").value === ADMIN_PASSWORD){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    loadAll();
  }else{
    alert("Wrong password");
  }
}
function logout(){ location.reload(); }

/* OFFER */
function saveOffer(){
  localStorage.setItem("vegx_offer", document.getElementById("offerText").value);
  loadAll();
}

/* SETTINGS */
function saveSettings(){
  localStorage.setItem("vegx_min_order", document.getElementById("minOrder").value);
  localStorage.setItem("vegx_delivery_charge", document.getElementById("deliveryCharge").value);
  alert("Settings saved");
}

/* ADD PRODUCT */
function addProduct(){
  let products = JSON.parse(localStorage.getItem("vegx_products")) || [];

  products.push({
    id: Date.now(),
    name: pname.value,
    weight: pweight.value,
    price: Number(pprice.value),
    image: pimage.value,
    active: true
  });

  localStorage.setItem("vegx_products", JSON.stringify(products));
  pname.value=pweight.value=pprice.value=pimage.value="";
  renderProducts();
}

/* TOGGLE STOCK */
function toggleProduct(id){
  let products = JSON.parse(localStorage.getItem("vegx_products")) || [];
  products = products.map(p=>{
    if(p.id===id) p.active=!p.active;
    return p;
  });
  localStorage.setItem("vegx_products", JSON.stringify(products));
  renderProducts();
}

/* UPDATE PRICE */
function updatePrice(id,val){
  let products = JSON.parse(localStorage.getItem("vegx_products")) || [];
  products.forEach(p=>{
    if(p.id===id) p.price=Number(val);
  });
  localStorage.setItem("vegx_products", JSON.stringify(products));
}

/* RENDER PRODUCTS */
function renderProducts(){
  const box = document.getElementById("productList");
  box.innerHTML="";
  let products = JSON.parse(localStorage.getItem("vegx_products")) || [];

  products.forEach(p=>{
    box.innerHTML += `
      <div class="product-row">
        <b>${p.name}</b> (${p.weight})<br>
        ₹ <input type="number" value="${p.price}" 
           onchange="updatePrice(${p.id},this.value)">
        <br>
        Status: ${p.active ? "🟢 Active" : "🔴 Stock Out"}<br>
        <button class="small-btn" onclick="toggleProduct(${p.id})">
          ${p.active ? "Mark Stock Out" : "Activate"}
        </button>
      </div>
    `;
  });
}

/* LOAD */
function loadAll(){
  offerText.value = localStorage.getItem("vegx_offer") || "";
  currentOffer.innerText = localStorage.getItem("vegx_offer") || "";
  minOrder.value = localStorage.getItem("vegx_min_order") || 299;
  deliveryCharge.value = localStorage.getItem("vegx_delivery_charge") || 50;
  renderProducts();
}
</script>

</body>
</html>
