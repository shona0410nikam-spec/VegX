<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VEG X – Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:15px;
}
h2{color:#2e7d32}
.box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
input,select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
}
button{
  background:#2e7d32;
  color:#fff;
  border:none;
  border-radius:6px;
}
.logout{background:#d32f2f}
.product{
  display:flex;
  gap:6px;
  align-items:center;
}
.product input{flex:1}
</style>
</head>

<body>

<h2>🔐 VEG X Admin Panel</h2>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <input type="password" id="password" placeholder="Admin Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none">

<button class="logout" onclick="logout()">Logout</button>

<!-- OFFER -->
<div class="box">
  <h3>🏷 Offer Banner</h3>
  <input id="offerText" placeholder="Eg: Free delivery above ₹499">
  <button onclick="saveOffer()">Save Offer</button>
</div>

<!-- SETTINGS -->
<div class="box">
  <h3>⚙ Order Settings</h3>
  <input id="minOrder" type="number" placeholder="Minimum Order ₹">
  <input id="deliveryCharge" type="number" placeholder="Delivery Charge ₹">
  <button onclick="saveSettings()">Save Settings</button>
</div>

<!-- ADD PRODUCT -->
<div class="box">
  <h3>➕ Add New Product</h3>
  <input id="pName" placeholder="Product Name">
  <input id="pWeight" placeholder="Weight (eg 300gm)">
  <input id="pPrice" type="number" placeholder="Price">
  <input id="pImage" placeholder="Image file name">
  <button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCT CONTROL -->
<div class="box">
  <h3>📦 Product Control</h3>
  <div id="productList"></div>
</div>

</div>

<script>
const ADMIN_PASSWORD="vegx123";

/* LOGIN */
function login(){
 if(password.value===ADMIN_PASSWORD){
  loginBox.style.display="none";
  adminPanel.style.display="block";
  loadData();
 } else alert("Wrong password");
}
function logout(){location.reload();}

/* DATA */
function getProducts(){
 return JSON.parse(localStorage.getItem("vegx_products")) || [];
}
function saveProducts(p){
 localStorage.setItem("vegx_products",JSON.stringify(p));
 renderProducts();
}

/* OFFER */
function saveOffer(){
 localStorage.setItem("vegx_offer",offerText.value);
 alert("Offer saved");
}

/* SETTINGS */
function saveSettings(){
 localStorage.setItem("vegx_min_order",minOrder.value);
 localStorage.setItem("vegx_delivery_charge",deliveryCharge.value);
 alert("Settings saved");
}

/* ADD PRODUCT */
function addProduct(){
 let p=getProducts();
 p.push({
  name:pName.value,
  weight:pWeight.value,
  price:Number(pPrice.value),
  image:pImage.value,
  active:true
 });
 saveProducts(p);
 pName.value=pWeight.value=pPrice.value=pImage.value="";
}

/* RENDER */
function renderProducts(){
 let list=document.getElementById("productList");
 list.innerHTML="";
 getProducts().forEach((p,i)=>{
  list.innerHTML+=`
   <div class="product">
    <input value="${p.name}" onchange="edit(${i},'name',this.value)">
    <input value="${p.price}" type="number" onchange="edit(${i},'price',this.value)">
    <select onchange="toggle(${i},this.value)">
      <option value="true" ${p.active?"selected":""}>ON</option>
      <option value="false" ${!p.active?"selected":""}>OFF</option>
    </select>
   </div>`;
 });
}
function edit(i,f,v){
 let p=getProducts(); p[i][f]=v; saveProducts(p);
}
function toggle(i,v){
 let p=getProducts(); p[i].active=(v==="true"); saveProducts(p);
}

/* LOAD */
function loadData(){
 minOrder.value=localStorage.getItem("vegx_min_order")||299;
 deliveryCharge.value=localStorage.getItem("vegx_delivery_charge")||50;
 renderProducts();
}
</script>

</body>
</html>
